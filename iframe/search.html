<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Part-DB Search</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .detail-section { margin-bottom: 12px; }
        .detail-section-title {
            font-size: 11px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 6px;
            padding-bottom: 4px; border-bottom: 1px solid var(--border-color);
        }
        .back-btn {
            cursor: pointer; color: var(--accent); font-size: 12px;
            margin-bottom: 8px; display: inline-flex; align-items: center; gap: 4px;
        }
        .back-btn:hover { text-decoration: underline; }
        .supplier-card {
            background: var(--bg-tertiary); border-radius: var(--radius);
            padding: 8px 10px; margin-bottom: 6px; font-size: 12px;
        }
        .supplier-card .supplier-name { font-weight: 600; color: var(--text-primary); }
        .supplier-card .supplier-spn { color: var(--text-secondary); font-family: var(--font-mono); font-size: 11px; }
        .supplier-card .supplier-price { color: var(--accent); font-weight: 500; }
        .param-table td:first-child { color: var(--text-secondary); font-weight: 500; }
        .category-path { font-size: 11px; color: var(--text-muted); }

        /* Category tree */
        .tree-node { user-select: none; }
        .tree-label {
            display: flex; align-items: center; gap: 4px; padding: 4px 6px;
            cursor: pointer; font-size: 12px; border-radius: 3px; transition: background 0.1s;
        }
        .tree-label:hover { background: var(--bg-hover); }
        .tree-label.active { background: var(--accent-bg); color: var(--accent); }
        .tree-toggle {
            width: 16px; height: 16px; display: inline-flex; align-items: center;
            justify-content: center; font-size: 10px; color: var(--text-muted);
            flex-shrink: 0; transition: transform 0.15s;
        }
        .tree-toggle.expanded { transform: rotate(90deg); }
        .tree-toggle.empty { visibility: hidden; }
        .tree-children { padding-left: 14px; }
        .tree-children.collapsed { display: none; }
        .tree-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tree-count {
            font-size: 10px; color: var(--text-muted); background: var(--bg-tertiary);
            padding: 0 5px; border-radius: 8px; flex-shrink: 0;
        }

        /* Filter bar */
        .filter-bar {
            display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
            padding: 4px 0; font-size: 11px;
        }
        .filter-chip {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 8px; background: var(--bg-tertiary); border: 1px solid var(--border-color);
            border-radius: 12px; font-size: 11px; cursor: pointer; transition: all 0.15s;
        }
        .filter-chip:hover { border-color: var(--accent); }
        .filter-chip.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
        .filter-chip .chip-x { font-size: 10px; opacity: 0.6; margin-left: 2px; }
        .filter-chip .chip-x:hover { opacity: 1; }

        /* Copyable text */
        .copyable { cursor: pointer; position: relative; }
        .copyable:hover { color: var(--accent); }
        .copyable::after {
            content: 'Copied!'; position: absolute; top: -22px; left: 50%;
            transform: translateX(-50%); background: var(--bg-tertiary);
            padding: 2px 6px; border-radius: 3px; font-size: 10px;
            pointer-events: none; opacity: 0; transition: opacity 0.15s;
        }
        .copyable.copied::after { opacity: 1; }

        /* Sidebar header */
        .sidebar-header {
            font-size: 11px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.5px; color: var(--text-muted); padding: 6px 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Search Header -->
        <div class="header">
            <div class="search-bar" style="flex: 1;">
                <input type="search" id="searchInput" placeholder="Search by name, description, MPN, IPN...">
                <button class="btn btn-primary" id="btnSearch">Search</button>
            </div>
        </div>

        <!-- Filter bar -->
        <div class="filter-bar" id="filterBar">
            <div class="filter-chip" id="filterInStock" title="Show only parts with stock > 0">In Stock</div>
            <div class="filter-chip" id="filterFavorites" title="Show favorite parts only">Favorites</div>
            <span id="activeCategoryChip" style="display: none;"></span>
        </div>

        <!-- Main Content: sidebar + results -->
        <div class="content" id="mainContent" style="display: flex; gap: 10px;">
            <!-- Category Tree Sidebar -->
            <div id="categorySidebar" style="width: 200px; flex-shrink: 0; display: flex; flex-direction: column; overflow: hidden;">
                <div class="sidebar-header">Categories</div>
                <div id="categoryTree" class="category-tree" style="flex: 1; overflow-y: auto; padding: 4px;">
                    <div style="padding: 12px; color: var(--text-muted); font-size: 11px;">Loading...</div>
                </div>
            </div>

            <!-- Results area -->
            <div style="flex: 1; min-width: 0; display: flex; flex-direction: column;">
                <!-- Results view (default) -->
                <div id="resultsView" style="flex: 1; display: flex; flex-direction: column;">
                    <div id="resultsInfo" class="pagination" style="display: none;">
                        <span id="resultsCount"></span>
                    </div>
                    <div class="table-container" id="resultsTable" style="display: none; flex: 1;">
                        <table>
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Description</th>
                                    <th>Category</th>
                                    <th>MPN</th>
                                    <th>Stock</th>
                                    <th>Storage</th>
                                </tr>
                            </thead>
                            <tbody id="resultsBody"></tbody>
                        </table>
                    </div>
                    <div id="resultsEmpty" class="empty-state">
                        <div class="icon">&#128270;</div>
                        <div>Search your Part-DB inventory</div>
                        <div style="font-size: 11px; margin-top: 4px; color: var(--text-muted);">
                            Enter a search term or click a category to browse
                        </div>
                    </div>
                    <div id="resultsLoading" class="loading" style="display: none;">
                        <div class="spinner"></div>
                        <span>Searching...</span>
                    </div>
                    <div class="pagination" id="paginationBar" style="display: none;">
                        <button class="btn btn-sm" id="btnPrevPage">&laquo; Previous</button>
                        <span id="pageInfo"></span>
                        <button class="btn btn-sm" id="btnNextPage">Next &raquo;</button>
                    </div>
                </div>

                <!-- Part Detail view (hidden by default) -->
                <div id="detailView" style="display: none;">
                    <div class="back-btn" id="btnBack">&larr; Back to results</div>
                    <div class="detail-panel" id="detailContent"></div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div id="connectionInfo" style="display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted);">
                <span class="status-dot status-disconnected" id="statusDot"></span>
                <span id="statusText">Not connected</span>
            </div>
        </div>
    </div>

    <script>
        // Inline shared helpers (iframe sandbox blocks external script src)
        function showToast(message, type = 'success') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        function copyToClipboard(text, el) {
            navigator.clipboard.writeText(text).then(() => {
                if (el) { el.classList.add('copied'); setTimeout(() => el.classList.remove('copied'), 1200); }
                showToast('Copied: ' + text);
            }).catch(() => showToast('Copy failed', 'error'));
        }

        // PartDBClient (inlined — iframe sandbox blocks external script src)
        class PartDBClient {
            constructor() { this.baseUrl = ''; this.token = ''; }
            async loadSettings() {
                try {
                    this.baseUrl = (await eda.sys_Storage.getExtensionUserConfig('PARTDB_URL')) || '';
                    this.token = (await eda.sys_Storage.getExtensionUserConfig('PARTDB_TOKEN')) || '';
                } catch (e) {}
                this.baseUrl = this.baseUrl.replace(/\/+$/, '');
            }
            isConfigured() { return this.baseUrl && this.token; }
            async request(endpoint, options = {}) {
                if (!this.isConfigured()) throw new Error('Part-DB connection not configured.');
                const response = await fetch(`${this.baseUrl}${endpoint}`, {
                    ...options,
                    headers: {
                        'Authorization': `Bearer ${this.token}`,
                        'Accept': 'application/json',
                        'Content-Type': 'application/json',
                        ...(options.headers || {}),
                    },
                });
                if (!response.ok) {
                    if (response.status === 401) throw new Error('Authentication failed. Check your API token.');
                    if (response.status === 403) throw new Error('Access denied. Token may lack required permissions.');
                    throw new Error(`API error: ${response.status} ${response.statusText}`);
                }
                return response.json();
            }
            async getPart(id) { return this.request(`/api/parts/${id}`); }
            async getCategories(page = 1, itemsPerPage = 500) {
                const params = new URLSearchParams({ page: page.toString(), itemsPerPage: itemsPerPage.toString(), 'order[name]': 'asc' });
                return this.request(`/api/categories?${params}`);
            }
            static extractId(iri) {
                if (!iri) return null;
                if (typeof iri === 'number') return iri;
                const match = String(iri).match(/\/(\d+)$/);
                return match ? parseInt(match[1], 10) : null;
            }
            static calculateStock(partLots) {
                if (!partLots || partLots.length === 0) return 0;
                let total = 0, hasUnknown = false;
                for (const lot of partLots) {
                    if (lot.instock_unknown) { hasUnknown = true; continue; }
                    if (lot.expiration_date && new Date(lot.expiration_date) < new Date()) continue;
                    total += lot.amount || 0;
                }
                return (total === 0 && hasUnknown) ? '?' : total;
            }
            static stockClass(stock, minAmount = 0) {
                if (stock === '?') return 'stock-low';
                if (stock <= 0) return 'stock-zero';
                if (minAmount > 0 && stock < minAmount) return 'stock-low';
                return 'stock-ok';
            }
        }
    </script>
    <script>
        const client = new PartDBClient();
        let currentPage = 1;
        let totalPages = 1;
        let selectedCategoryId = '';
        let selectedCategoryName = '';
        let filterInStock = false;
        let filterFavorites = false;

        // DOM refs
        const searchInput = document.getElementById('searchInput');
        const btnSearch = document.getElementById('btnSearch');
        const resultsView = document.getElementById('resultsView');
        const detailView = document.getElementById('detailView');
        const resultsBody = document.getElementById('resultsBody');
        const resultsTable = document.getElementById('resultsTable');
        const resultsEmpty = document.getElementById('resultsEmpty');
        const resultsLoading = document.getElementById('resultsLoading');
        const resultsInfo = document.getElementById('resultsInfo');
        const resultsCount = document.getElementById('resultsCount');
        const paginationBar = document.getElementById('paginationBar');
        const pageInfo = document.getElementById('pageInfo');
        const btnPrevPage = document.getElementById('btnPrevPage');
        const btnNextPage = document.getElementById('btnNextPage');
        const detailContent = document.getElementById('detailContent');
        const btnBack = document.getElementById('btnBack');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const categoryTree = document.getElementById('categoryTree');
        const filterInStockEl = document.getElementById('filterInStock');
        const filterFavoritesEl = document.getElementById('filterFavorites');
        const activeCategoryChip = document.getElementById('activeCategoryChip');

        // ── Initialize ─────────────────────────────────────────────────
        async function init() {
            await client.loadSettings();
            if (client.isConfigured()) {
                statusDot.className = 'status-dot status-connected';
                statusText.textContent = 'Connected';
                loadCategoryTree();
            } else {
                statusText.textContent = 'Not configured — use Part-DB > Settings';
                categoryTree.innerHTML = '<div style="padding: 12px; color: var(--text-muted); font-size: 11px;">Connect to Part-DB first</div>';
            }
        }

        // ── Category Tree ──────────────────────────────────────────────
        async function loadCategoryTree() {
            try {
                const data = await client.getCategories(1, 500);
                const cats = data['hydra:member'] || data.member || data || [];
                renderTree(cats);
            } catch (e) {
                categoryTree.innerHTML = `<div style="padding: 12px; color: var(--danger); font-size: 11px;">${escapeHtml(e.message)}</div>`;
            }
        }

        function renderTree(cats) {
            const byParent = {};
            const catMap = {};
            for (const cat of cats) {
                const id = PartDBClient.extractId(cat['@id'] || cat.id);
                const parentIri = cat.parent;
                let parentId = null;
                if (parentIri) {
                    parentId = typeof parentIri === 'object'
                        ? PartDBClient.extractId(parentIri['@id'] || parentIri.id)
                        : PartDBClient.extractId(parentIri);
                }
                catMap[id] = { ...cat, _id: id, _parentId: parentId };
                if (!byParent[parentId]) byParent[parentId] = [];
                byParent[parentId].push(id);
            }

            function buildNodes(parentId) {
                const children = byParent[parentId] || [];
                if (children.length === 0) return '';
                let html = '';
                for (const id of children) {
                    const cat = catMap[id];
                    const name = cat.name || `Category ${id}`;
                    const hasKids = (byParent[id] || []).length > 0;
                    const kidHtml = hasKids ? buildNodes(id) : '';
                    html += `<div class="tree-node">
                        <div class="tree-label" data-id="${id}" data-name="${escapeHtml(cat.full_path || name)}">
                            <span class="tree-toggle ${hasKids ? '' : 'empty'}" data-id="${id}">&#9654;</span>
                            <span class="tree-name">${escapeHtml(name)}</span>
                        </div>
                        ${hasKids ? `<div class="tree-children collapsed" data-parent="${id}">${kidHtml}</div>` : ''}
                    </div>`;
                }
                return html;
            }

            let html = `<div class="tree-label active" data-id="" data-name="All Categories">
                <span class="tree-toggle empty">&#9654;</span>
                <span class="tree-name">All Categories</span>
            </div>`;
            html += buildNodes(null);
            categoryTree.innerHTML = html;

            // Event delegation
            categoryTree.addEventListener('click', (e) => {
                const toggle = e.target.closest('.tree-toggle:not(.empty)');
                if (toggle) {
                    const id = toggle.dataset.id;
                    const childrenEl = categoryTree.querySelector(`.tree-children[data-parent="${id}"]`);
                    if (childrenEl) {
                        childrenEl.classList.toggle('collapsed');
                        toggle.classList.toggle('expanded');
                    }
                    e.stopPropagation();
                    return;
                }

                const label = e.target.closest('.tree-label');
                if (label) {
                    const prev = categoryTree.querySelector('.tree-label.active');
                    if (prev) prev.classList.remove('active');
                    label.classList.add('active');

                    selectedCategoryId = label.dataset.id;
                    selectedCategoryName = label.dataset.name;
                    updateCategoryChip();
                    searchParts(1);
                }
            });
        }

        function updateCategoryChip() {
            if (selectedCategoryId) {
                activeCategoryChip.innerHTML = `<div class="filter-chip active">
                    ${escapeHtml(selectedCategoryName)} <span class="chip-x" id="clearCategory">&times;</span>
                </div>`;
                activeCategoryChip.style.display = 'inline';
                document.getElementById('clearCategory').addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectedCategoryId = '';
                    selectedCategoryName = '';
                    const prev = categoryTree.querySelector('.tree-label.active');
                    if (prev) prev.classList.remove('active');
                    const allLabel = categoryTree.querySelector('.tree-label[data-id=""]');
                    if (allLabel) allLabel.classList.add('active');
                    updateCategoryChip();
                    searchParts(1);
                });
            } else {
                activeCategoryChip.style.display = 'none';
                activeCategoryChip.innerHTML = '';
            }
        }

        // ── Filters ────────────────────────────────────────────────────
        filterInStockEl.addEventListener('click', () => {
            filterInStock = !filterInStock;
            filterInStockEl.classList.toggle('active', filterInStock);
            if (searchInput.value.trim() || selectedCategoryId || filterFavorites) searchParts(1);
        });
        filterFavoritesEl.addEventListener('click', () => {
            filterFavorites = !filterFavorites;
            filterFavoritesEl.classList.toggle('active', filterFavorites);
            searchParts(1);
        });

        // ── Search ─────────────────────────────────────────────────────
        async function searchParts(page = 1) {
            const query = searchInput.value.trim();

            if (!query && !selectedCategoryId && !filterFavorites) {
                showToast('Enter a search term, select a category, or enable a filter', 'warning');
                return;
            }

            if (!client.isConfigured()) {
                showToast('Configure Part-DB connection first (Part-DB > Settings)', 'error');
                return;
            }

            currentPage = page;

            // Show loading
            resultsTable.style.display = 'none';
            resultsEmpty.style.display = 'none';
            resultsLoading.style.display = 'flex';
            resultsInfo.style.display = 'none';
            paginationBar.style.display = 'none';

            try {
                const baseParams = new URLSearchParams({
                    page: page.toString(),
                    itemsPerPage: '30',
                    'order[name]': 'asc',
                });
                if (selectedCategoryId) baseParams.set('category', selectedCategoryId + '++');
                if (filterFavorites) baseParams.set('favorite', 'true');

                let parts = [];
                let totalItems = 0;

                if (query) {
                    const wildcard = `%${query}%`;
                    // Search across multiple fields, merge unique results
                    const fields = ['name', 'description', 'manufacturer_product_number', 'ipn', 'tags'];
                    const seenIds = new Set();

                    for (const field of fields) {
                        const params = new URLSearchParams(baseParams);
                        params.set(field, wildcard);
                        try {
                            const data = await client.request(`/api/parts?${params}`);
                            const found = data['hydra:member'] || data.member || data || [];
                            for (const p of found) {
                                const pid = String(PartDBClient.extractId(p['@id'] || p.id));
                                if (!seenIds.has(pid)) {
                                    seenIds.add(pid);
                                    parts.push(p);
                                }
                            }
                        } catch (e) {
                            // Skip fields that error (e.g., tags filter might behave differently)
                        }
                        // If we have plenty of results from early fields, stop searching
                        if (parts.length >= 30) break;
                    }
                    totalItems = parts.length;
                } else {
                    // Category/favorites browse only
                    const data = await client.request(`/api/parts?${baseParams}`);
                    parts = data['hydra:member'] || data.member || data || [];
                    totalItems = data['hydra:totalItems'] || parts.length;
                }

                // Client-side stock filter
                if (filterInStock) {
                    parts = parts.filter(p => {
                        const stock = PartDBClient.calculateStock(p.partLots || []);
                        return stock === '?' || stock > 0;
                    });
                    totalItems = parts.length;
                }

                totalPages = Math.ceil(totalItems / 30) || 1;
                resultsLoading.style.display = 'none';

                if (parts.length === 0) {
                    resultsEmpty.innerHTML = `
                        <div class="icon">&#128269;</div>
                        <div>No parts found</div>
                        <div style="font-size: 11px; margin-top: 4px; color: var(--text-muted);">
                            Try a different search term or category
                        </div>
                    `;
                    resultsEmpty.style.display = 'block';
                    return;
                }

                // Sort merged results by name
                parts.sort((a, b) => (a.name || '').localeCompare(b.name || ''));

                // Render results
                resultsBody.innerHTML = '';
                for (const part of parts) {
                    const id = PartDBClient.extractId(part['@id'] || part.id);
                    const stock = PartDBClient.calculateStock(part.partLots || []);
                    const stockCls = PartDBClient.stockClass(stock, part.minamount || 0);

                    const locations = (part.partLots || [])
                        .filter(l => l.storage_location)
                        .map(l => typeof l.storage_location === 'object' ? l.storage_location.name : l.storage_location)
                        .filter(Boolean);
                    const locationStr = [...new Set(locations)].join(', ');

                    let catName = '';
                    if (part.category && typeof part.category === 'object') {
                        catName = part.category.full_path || part.category.name || '';
                    }

                    const mpn = part.manufacturer_product_number || '';

                    const tr = document.createElement('tr');
                    tr.onclick = () => showPartDetail(id);
                    tr.innerHTML = `
                        <td><strong>${escapeHtml(part.name)}</strong></td>
                        <td title="${escapeHtml(part.description || '')}">${escapeHtml(part.description || '-')}</td>
                        <td class="category-path">${escapeHtml(catName || '-')}</td>
                        <td style="font-family: var(--font-mono); font-size: 11px;">${mpn ? `<span class="copyable" onclick="event.stopPropagation(); copyToClipboard('${escapeHtml(mpn)}', this);" title="Click to copy">${escapeHtml(mpn)}</span>` : '-'}</td>
                        <td><span class="stock-badge ${stockCls}">${stock}</span></td>
                        <td>${escapeHtml(locationStr || '-')}</td>
                    `;
                    resultsBody.appendChild(tr);
                }

                resultsTable.style.display = 'block';
                resultsInfo.style.display = 'flex';
                resultsCount.textContent = `${totalItems} part${totalItems !== 1 ? 's' : ''} found`;

                if (totalPages > 1) {
                    paginationBar.style.display = 'flex';
                    pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;
                    btnPrevPage.disabled = currentPage <= 1;
                    btnNextPage.disabled = currentPage >= totalPages;
                }
            } catch (e) {
                resultsLoading.style.display = 'none';
                resultsEmpty.innerHTML = `
                    <div class="icon">&#9888;</div>
                    <div style="color: var(--danger);">${escapeHtml(e.message)}</div>
                `;
                resultsEmpty.style.display = 'block';
            }
        }

        // ── Part Detail ────────────────────────────────────────────────
        async function showPartDetail(partId) {
            resultsView.style.display = 'none';
            detailView.style.display = 'block';
            detailContent.innerHTML = '<div class="loading"><div class="spinner"></div><span>Loading part details...</span></div>';

            try {
                const part = await client.getPart(partId);
                renderPartDetail(part);
            } catch (e) {
                detailContent.innerHTML = `<div style="color: var(--danger);">Failed to load part: ${escapeHtml(e.message)}</div>`;
            }
        }

        function renderPartDetail(part) {
            const stock = PartDBClient.calculateStock(part.partLots || []);
            const stockCls = PartDBClient.stockClass(stock, part.minamount || 0);

            let catName = '';
            if (part.category && typeof part.category === 'object') {
                catName = part.category.full_path || part.category.name || '';
            }
            let mfr = '';
            if (part.manufacturer && typeof part.manufacturer === 'object') {
                mfr = part.manufacturer.name || '';
            }
            let footprint = '';
            if (part.footprint && typeof part.footprint === 'object') {
                footprint = part.footprint.name || '';
            }

            const mpn = part.manufacturer_product_number || '';
            const ipn = part.ipn || '';

            let html = `<h3>${escapeHtml(part.name)}</h3>`;

            html += `<div class="detail-section">
                <div class="detail-section-title">General</div>
                <div class="detail-row"><span class="detail-label">Description</span><span class="detail-value">${escapeHtml(part.description || '-')}</span></div>
                <div class="detail-row"><span class="detail-label">Category</span><span class="detail-value">${escapeHtml(catName || '-')}</span></div>
                <div class="detail-row"><span class="detail-label">Manufacturer</span><span class="detail-value">${escapeHtml(mfr || '-')}</span></div>
                <div class="detail-row"><span class="detail-label">MPN</span><span class="detail-value" style="font-family: var(--font-mono);">${mpn ? `<span class="copyable" onclick="copyToClipboard('${escapeHtml(mpn)}', this)" title="Click to copy">${escapeHtml(mpn)}</span>` : '-'}</span></div>
                <div class="detail-row"><span class="detail-label">Footprint</span><span class="detail-value">${escapeHtml(footprint || '-')}</span></div>
                ${ipn ? `<div class="detail-row"><span class="detail-label">IPN</span><span class="detail-value" style="font-family: var(--font-mono);"><span class="copyable" onclick="copyToClipboard('${escapeHtml(ipn)}', this)" title="Click to copy">${escapeHtml(ipn)}</span></span></div>` : ''}
                ${part.tags ? `<div class="detail-row"><span class="detail-label">Tags</span><span class="detail-value">${escapeHtml(part.tags)}</span></div>` : ''}
                ${part.comment ? `<div class="detail-row"><span class="detail-label">Notes</span><span class="detail-value">${escapeHtml(part.comment)}</span></div>` : ''}
            </div>`;

            html += `<div class="detail-section">
                <div class="detail-section-title">Stock</div>
                <div class="detail-row">
                    <span class="detail-label">Total Stock</span>
                    <span class="detail-value"><span class="stock-badge ${stockCls}">${stock}</span></span>
                </div>
                ${part.minamount ? `<div class="detail-row"><span class="detail-label">Min. Amount</span><span class="detail-value">${part.minamount}</span></div>` : ''}`;

            if (part.partLots && part.partLots.length > 0) {
                for (const lot of part.partLots) {
                    let locName = '';
                    if (lot.storage_location && typeof lot.storage_location === 'object') {
                        locName = lot.storage_location.full_path || lot.storage_location.name || '';
                    }
                    const qty = lot.instock_unknown ? '?' : (lot.amount || 0);
                    html += `<div class="detail-row">
                        <span class="detail-label" style="padding-left: 12px;">${escapeHtml(locName || 'Unassigned')}</span>
                        <span class="detail-value">${qty}${lot.comment ? ` (${escapeHtml(lot.comment)})` : ''}</span>
                    </div>`;
                }
            }
            html += `</div>`;

            if (part.orderdetails && part.orderdetails.length > 0) {
                html += `<div class="detail-section">
                    <div class="detail-section-title">Suppliers</div>`;
                for (const od of part.orderdetails) {
                    let supplierName = '';
                    if (od.supplier && typeof od.supplier === 'object') {
                        supplierName = od.supplier.name || '';
                    }
                    html += `<div class="supplier-card">
                        <div class="supplier-name">${escapeHtml(supplierName || 'Unknown Supplier')}</div>
                        <div class="supplier-spn">SPN: <span class="copyable" onclick="copyToClipboard('${escapeHtml(od.supplierpartnr || '')}', this)" title="Click to copy">${escapeHtml(od.supplierpartnr || '-')}</span></div>
                        ${od.supplier_product_url ? `<div><a href="${escapeHtml(od.supplier_product_url)}" target="_blank" style="color: var(--accent); font-size: 11px;">View at supplier</a></div>` : ''}`;
                    if (od.pricedetails && od.pricedetails.length > 0) {
                        for (const pd of od.pricedetails) {
                            const price = pd.price || '?';
                            const currency = pd.currency && typeof pd.currency === 'object' ? pd.currency.iso_code : '';
                            const minQty = pd.min_discount_quantity || 1;
                            html += `<div class="supplier-price">${price} ${currency} (min qty: ${minQty})</div>`;
                        }
                    }
                    html += `</div>`;
                }
                html += `</div>`;
            }

            if (part.parameters && part.parameters.length > 0) {
                html += `<div class="detail-section">
                    <div class="detail-section-title">Parameters</div>
                    <table class="param-table" style="font-size: 12px;">`;
                for (const param of part.parameters) {
                    let value = param.value_text || '';
                    if (!value && param.value_typical !== null && param.value_typical !== undefined) {
                        value = String(param.value_typical);
                        if (param.unit) value += ` ${param.unit}`;
                    }
                    if (!value && param.value_min !== null && param.value_max !== null) {
                        value = `${param.value_min} - ${param.value_max}`;
                        if (param.unit) value += ` ${param.unit}`;
                    }
                    html += `<tr>
                        <td style="padding: 3px 10px 3px 0; width: 140px;">${escapeHtml(param.name)}${param.group ? ` <span style="color: var(--text-muted);">(${escapeHtml(param.group)})</span>` : ''}</td>
                        <td style="padding: 3px 0;">${escapeHtml(value || '-')}${param.symbol ? ` ${escapeHtml(param.symbol)}` : ''}</td>
                    </tr>`;
                }
                html += `</table></div>`;
            }

            if (part.attachments && part.attachments.length > 0) {
                html += `<div class="detail-section">
                    <div class="detail-section-title">Attachments</div>`;
                for (const att of part.attachments) {
                    const name = att.name || att.original_filename || 'Attachment';
                    const url = att.url || '';
                    if (url) {
                        const fullUrl = url.startsWith('http') ? url : `${client.baseUrl}${url}`;
                        html += `<div class="detail-row">
                            <span class="detail-label">${escapeHtml(name)}</span>
                            <span class="detail-value"><a href="${escapeHtml(fullUrl)}" target="_blank">Open</a></span>
                        </div>`;
                    }
                }
                html += `</div>`;
            }

            const partId = PartDBClient.extractId(part['@id'] || part.id);
            html += `<div class="detail-section" style="margin-top: 12px;">
                <a href="${client.baseUrl}/en/part/${partId}" target="_blank" style="color: var(--accent); font-size: 12px;">
                    Open in Part-DB &rarr;
                </a>
            </div>`;

            detailContent.innerHTML = html;
        }

        // ── Event listeners ────────────────────────────────────────────
        btnSearch.addEventListener('click', () => searchParts(1));
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') searchParts(1);
        });

        btnPrevPage.addEventListener('click', () => {
            if (currentPage > 1) searchParts(currentPage - 1);
        });
        btnNextPage.addEventListener('click', () => {
            if (currentPage < totalPages) searchParts(currentPage + 1);
        });

        btnBack.addEventListener('click', () => {
            detailView.style.display = 'none';
            resultsView.style.display = 'flex';
        });

        init();
    </script>
</body>
</html>
